name: Build Odin (Windows with SDL3 Bundled)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Odin
        uses: laytan/setup-odin@v2
        with:
          release: latest 
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Build Directory
        run: mkdir build

      - name: Fetch and Bundle Windows SDL3 DLLs
        shell: bash
        run: |

          curl -fSL -o sdl3.zip https://github.com/libsdl-org/SDL/releases/download/release-3.4.12/SDL3-3.4.12-win32-x64.zip
          curl -fSL -o sdl3_image.zip https://github.com/libsdl-org/SDL_image/releases/download/release-3.4.4/SDL3_image-3.4.4-win32-x64.zip
          curl -fSL -o sdl3_mixer.zip https://github.com/libsdl-org/SDL_mixer/releases/download/release-3.2.4/SDL3_mixer-3.2.4-win32-x64.zip
          curl -fSL -o sdl3_ttf.zip https://github.com/libsdl-org/SDL_ttf/releases/download/release-3.2.2/SDL3_ttf-3.2.2-win32-x64.zip

          unzip -q sdl3.zip -d temp_sdl3
          unzip -q sdl3_image.zip -d temp_image
          unzip -q sdl3_mixer.zip -d temp_mixer
          unzip -q sdl3_ttf.zip -d temp_ttf

          find temp_sdl3 -name "*.dll" -exec cp {} build/ \;
          find temp_image -name "*.dll" -exec cp {} build/ \;
          find temp_mixer -name "*.dll" -exec cp {} build/ \;
          find temp_ttf -name "*.dll" -exec cp {} build/ \;

          rm -rf sdl3*.zip temp_*

      - name: Build with Maximum Optimization
        run: |
          odin build src -out:build/app.exe -o:speed -no-bounds-check -disable-assert

      - name: Upload Complete Release Bundle
        uses: actions/upload-artifact@v4
        with:
          name: odin-app-windows
          path: build/